{{/*
Shared secrets for the whole chart. In production the operator should
either pass `--set-file secrets.postgresPassword=path/to/file` or
create the Secret externally (e.g. via SealedSecrets / ExternalSecrets
operator) and set `global.createSecrets=false`.
*/}}
{{- if .Values.global.createSecrets | default true }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "georag.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | required "secrets.postgresPassword is required" | quote }}
  PG_APP_PASSWORD: {{ .Values.secrets.pgAppPassword | required "secrets.pgAppPassword is required" | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | required "secrets.neo4jPassword is required" | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | required "secrets.redisPassword is required" | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | quote }}
  FASTAPI_SERVICE_KEY: {{ .Values.secrets.fastapiServiceKey | required "secrets.fastapiServiceKey is required (32+ chars)" | quote }}
  LARAVEL_APP_KEY: {{ .Values.secrets.laravelAppKey | required "secrets.laravelAppKey is required (`php artisan key:generate --show`)" | quote }}
  HATCHET_CLIENT_TOKEN: {{ .Values.secrets.hatchetClientToken | quote }}
{{- end }}
