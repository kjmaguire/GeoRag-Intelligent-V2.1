{{- if .Values.pgbouncer.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pgbouncer
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "georag.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.pgbouncer.service.port }}
      targetPort: pgbouncer
      name: pgbouncer
  selector: {{- include "georag.selectorLabels" (dict "component" "pgbouncer" "root" .) | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pgbouncer
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "georag.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pgbouncer.replicas }}
  selector:
    matchLabels: {{- include "georag.selectorLabels" (dict "component" "pgbouncer" "root" .) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "georag.selectorLabels" (dict "component" "pgbouncer" "root" .) | nindent 8 }}
    spec:
      {{- include "georag.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: pgbouncer
          image: {{ include "georag.image" (dict "repo" .Values.pgbouncer.image.repository "tag" .Values.pgbouncer.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5432
              name: pgbouncer
          env:
            - name: DB_HOST
              value: {{ .Release.Name }}-postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: georag
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: POSTGRES_PASSWORD
            - name: POOL_MODE
              value: {{ .Values.pgbouncer.poolMode }}
            - name: DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
            - name: MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.maxClientConn | quote }}
            - name: AUTH_TYPE
              value: scram-sha-256
          resources: {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
