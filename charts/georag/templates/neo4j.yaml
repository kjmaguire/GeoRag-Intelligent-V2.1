{{- if .Values.neo4j.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-neo4j
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "georag.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.neo4j.service.boltPort }}
      targetPort: bolt
      name: bolt
    - port: {{ .Values.neo4j.service.httpPort }}
      targetPort: http
      name: http
  selector: {{- include "georag.selectorLabels" (dict "component" "neo4j" "root" .) | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-neo4j
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "georag.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}-neo4j
  replicas: 1
  selector:
    matchLabels: {{- include "georag.selectorLabels" (dict "component" "neo4j" "root" .) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "georag.selectorLabels" (dict "component" "neo4j" "root" .) | nindent 8 }}
    spec:
      {{- include "georag.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: neo4j
          image: {{ include "georag.image" (dict "repo" .Values.neo4j.image.repository "tag" .Values.neo4j.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: http
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_server_memory_heap_initial__size
              value: {{ .Values.neo4j.heapInitialSize }}
            - name: NEO4J_server_memory_heap_max__size
              value: {{ .Values.neo4j.heapMaxSize }}
            - name: NEO4J_server_memory_pagecache_size
              value: {{ .Values.neo4j.pagecacheSize }}
            - name: NEO4J_PLUGINS
              value: "[\"apoc\"]"
          resources: {{- toYaml .Values.neo4j.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["cypher-shell", "-u", "neo4j", "-p", "$(NEO4J_AUTH#neo4j/)", "RETURN 1"]
            initialDelaySeconds: 30
            periodSeconds: 10
  {{- if .Values.neo4j.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- $sc := include "georag.storageClass" (dict "svcStorageClass" "" "global" .Values.global) }}
        {{- if $sc }}
        storageClassName: {{ $sc }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size }}
  {{- end }}
{{- end }}
