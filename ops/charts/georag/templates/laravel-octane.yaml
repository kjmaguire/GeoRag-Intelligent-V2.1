{{- if .Values.laravelOctane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "georag.fullname" . }}-laravel-octane
  labels:
    {{- include "georag.labels" . | nindent 4 }}
    app.kubernetes.io/component: laravel-octane
spec:
  replicas: {{ .Values.laravelOctane.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: laravel-octane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: laravel-octane
      {{- with .Values.laravelOctane.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: octane
          image: {{ include "georag.image" (dict "Values" .Values "image" .Values.laravelOctane.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.laravelOctane.service.port }}
          env:
            {{- range $k, $v := .Values.laravelOctane.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "georag.fullname" . }}-secrets
                  key: app_key
            - name: FASTAPI_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "georag.fullname" . }}-secrets
                  key: fastapi_service_key
          envFrom:
            - configMapRef:
                name: {{ include "georag.fullname" . }}-config
          livenessProbe:
            httpGet: { path: /up, port: http }
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /up, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.laravelOctane.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "georag.fullname" . }}-laravel-octane
  labels:
    {{- include "georag.labels" . | nindent 4 }}
spec:
  type: {{ .Values.laravelOctane.service.type }}
  ports:
    - port: {{ .Values.laravelOctane.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: laravel-octane
{{- end }}
