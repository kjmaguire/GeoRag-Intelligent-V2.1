{{- if .Values.autoscaling.enabled }}
{{- range $component := list "laravelOctane" "fastapi" }}
{{- $values := index $.Values $component }}
{{- if $values.enabled }}
{{- $compName := ternary "laravel-octane" "fastapi" (eq $component "laravelOctane") }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "georag.fullname" $ }}-{{ $compName }}
  labels:
    {{- include "georag.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $compName }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "georag.fullname" $ }}-{{ $compName }}
  minReplicas: {{ $values.replicas }}
  maxReplicas: {{ $.Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $.Values.autoscaling.targetMemoryUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
{{- end }}
{{- end }}
{{- end }}
