{{- if .Values.fastapi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "georag.fullname" . }}-fastapi
  labels:
    {{- include "georag.labels" . | nindent 4 }}
    app.kubernetes.io/component: fastapi
spec:
  replicas: {{ .Values.fastapi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: fastapi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: fastapi
      {{- with .Values.fastapi.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: fastapi
          image: {{ include "georag.image" (dict "Values" .Values "image" .Values.fastapi.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.fastapi.service.port }}
          env:
            {{- range $k, $v := .Values.fastapi.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: FASTAPI_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "georag.fullname" . }}-secrets
                  key: fastapi_service_key
            - name: FASTAPI_SERVICE_KEY_KID
              valueFrom:
                secretKeyRef:
                  name: {{ include "georag.fullname" . }}-secrets
                  key: fastapi_service_key_kid
          envFrom:
            - configMapRef:
                name: {{ include "georag.fullname" . }}-config
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.fastapi.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "georag.fullname" . }}-fastapi
  labels:
    {{- include "georag.labels" . | nindent 4 }}
spec:
  type: {{ .Values.fastapi.service.type }}
  ports:
    - port: {{ .Values.fastapi.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: fastapi
{{- end }}
