        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind: {}
      - type: bind
        source: /home/Development/GeoRAG Intelligence V.1.0/docker/prometheus/rules
        target: /etc/prometheus/rules
        read_only: true
        bind: {}
  qdrant:
    profiles:
