# Plan §5a — Golden question set scaffold
#
# 20 categories × 2-3 placeholder questions = 40-60 seed questions.
#
# The eval.golden_questions table (migration 2026_05_13_140000) is the
# storage. This YAML is the source-of-truth seed. The plan §5a category
# label is stored in context_setup.plan_category since the table's
# existing question_set CHECK constraint only allows 8 values (the
# pre-plan-§5a categories). See OVERNIGHT_LOG.md decision #5.
#
# Status: SKELETON. Questions are placeholders shaped right for SME
# expansion. Each question has:
#   - id            : stable identifier (kebab-case category + index)
#   - category      : plan §5a category 1-20
#   - question      : the natural-language question
#   - question_set  : maps to the existing question_set CHECK values
#   - expected_intent_class : maps to the 6-intent classifier labels
#   - expected_citations    : []  — SME fills with real cited URIs
#   - expected_entities     : []  — SME fills
#   - expected_numeric_values : []  — SME fills (for grounding tests)
#   - expected_refusal      : bool — true for refusal-correctness category
#   - difficulty            : easy | medium | hard
#   - notes                 : free-text for SME context
#
# Loader: there is NO loader yet — Kyle decides whether to (a) write a
# Laravel seeder that reads this YAML, (b) use the existing Dagster
# eval pipeline, or (c) hand-populate via the eval admin UI.

categories:
  # ---------------------------------------------------------------------
  # 1. Exact drillhole lookup
  # ---------------------------------------------------------------------
  - id: exact-drillhole-lookup-01
    category: "Exact drillhole lookup (hole_id, assay values)"
    question: "What were the assay results for hole ECK-22-001?"
    question_set: numeric_grounding
    expected_intent_class: factual_lookup
    expected_citations: []
    expected_entities: ["hole_id:ECK-22-001"]
    expected_numeric_values: []
    expected_refusal: false
    difficulty: easy
    notes: "Hole ID extraction must succeed; per-interval grades expected."

  - id: exact-drillhole-lookup-02
    category: "Exact drillhole lookup (hole_id, assay values)"
    question: "Give me the Au, Ag, and Cu values for RLG-001 between 50 m and 100 m."
    question_set: numeric_grounding
    expected_intent_class: factual_lookup
    expected_entities: ["hole_id:RLG-001", "commodity:Au", "commodity:Ag", "commodity:Cu"]
    expected_numeric_values: []
    expected_refusal: false
    difficulty: medium

  - id: exact-drillhole-lookup-03
    category: "Exact drillhole lookup (hole_id, assay values)"
    question: "What is the deepest sample depth on hole PLS-22-08?"
    question_set: numeric_grounding
    expected_intent_class: factual_lookup
    expected_entities: ["hole_id:PLS-22-08"]
    expected_refusal: false
    difficulty: easy

