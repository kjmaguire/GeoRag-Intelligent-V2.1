# Source: georag/templates/jobs.yaml
# Nightly hash-chain verifier. Reports via audit row; fails the Job
# (and surfaces as a K8s event) if the chain is broken.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: georag-audit-chain-verify
  namespace: georag
  labels:
    helm.sh/chart: georag-0.1.0
    app.kubernetes.io/name: georag
    app.kubernetes.io/instance: georag
    app.kubernetes.io/version: "v1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: georag
            app.kubernetes.io/instance: georag
            app.kubernetes.io/component: audit-chain-verify
        spec:
          restartPolicy: OnFailure
          
          containers:
            - name: verify
              image: ghcr.io/anthropics/georag/fastapi:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.audit.chain_verify"]
              env:
                - name: POSTGRES_HOST
                  value: georag-postgresql
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: georag-secrets
                      key: POSTGRES_PASSWORD

