          - path: /internal
            pathType: Prefix
            backend:
              service:
                name: georag-fastapi
                port:
                  number: 8000
          # Map tiles
          - path: /tiles
            pathType: Prefix
            backend:
              service:
                name: georag-martin
                port:
                  number: 3000
          # Default: Laravel webapp
          - path: /
            pathType: Prefix
            backend:
              service:
                name: georag-laravel-octane
                port:
                  number: 8000
