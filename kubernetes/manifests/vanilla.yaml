    metadata:
      labels:
        app.kubernetes.io/name: georag
        app.kubernetes.io/instance: georag
        app.kubernetes.io/component: vllm
    spec:
      
      nodeSelector:
        nvidia.com/gpu.product: "NVIDIA-A100-SXM4-40GB"
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          args:
            - --model
            - "Qwen/Qwen3-14B-AWQ"
            - --max-model-len
            - "32768"
            - --port
            - "8000"
          resources:
            limits:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60  # vLLM cold-start can be slow
            periodSeconds: 15
            failureThreshold: 30  # tolerate ~7m model load on first boot
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 50Gi

