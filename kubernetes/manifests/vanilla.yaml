# Source: georag/templates/dagster.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: georag-dagster-webserver
  namespace: georag
  labels:
    helm.sh/chart: georag-0.1.0
    app.kubernetes.io/name: georag
    app.kubernetes.io/instance: georag
    app.kubernetes.io/version: "v1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: georag
      app.kubernetes.io/instance: georag
      app.kubernetes.io/component: dagster-webserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: georag
        app.kubernetes.io/instance: georag
        app.kubernetes.io/component: dagster-webserver
    spec:
      
      containers:
        - name: webserver
          image: ghcr.io/anthropics/georag/dagster:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DAGSTER_PG_HOST
              value: georag-postgresql
            - name: DAGSTER_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: georag-secrets
                  key: POSTGRES_PASSWORD
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: dagster-home
              mountPath: /opt/dagster/dagster_home
      volumes:
        - name: dagster-home
          persistentVolumeClaim:
            claimName: georag-dagster
