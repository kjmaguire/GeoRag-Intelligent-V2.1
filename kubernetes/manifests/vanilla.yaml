# Source: georag/templates/fastapi.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: georag-fastapi
  namespace: georag
  labels:
    helm.sh/chart: georag-0.1.0
    app.kubernetes.io/name: georag
    app.kubernetes.io/instance: georag
    app.kubernetes.io/version: "v1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: georag
      app.kubernetes.io/instance: georag
      app.kubernetes.io/component: fastapi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: georag
        app.kubernetes.io/instance: georag
        app.kubernetes.io/component: fastapi
    spec:
      
      containers:
        - name: fastapi
          image: ghcr.io/anthropics/georag/fastapi:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: POSTGRES_HOST
              value: georag-pgbouncer
            - name: POSTGRES_PORT
              value: "6432"
            - name: POSTGRES_DIRECT_HOST
              value: georag-postgresql
            - name: POSTGRES_DIRECT_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: georag_app
            - name: POSTGRES_DB
              value: georag
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: georag-secrets
                  key: PG_APP_PASSWORD
            - name: REDIS_HOST
              value: georag-redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: georag-secrets
                  key: REDIS_PASSWORD
            - name: QDRANT_HOST
              value: georag-qdrant
            - name: QDRANT_PORT
              value: "6333"
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: georag-secrets
                  key: QDRANT_API_KEY
            - name: NEO4J_HOST
              value: georag-neo4j
            - name: NEO4J_PORT
              value: "7687"
            - name: NEO4J_USERNAME
              value: neo4j
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: georag-secrets
                  key: NEO4J_PASSWORD
            - name: FASTAPI_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: georag-secrets
                  key: FASTAPI_SERVICE_KEY
            - name: VLLM_BASE_URL
              value: http://georag-vllm:8000/v1
            - name: HATCHET_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: georag-secrets
                  key: HATCHET_CLIENT_TOKEN
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
