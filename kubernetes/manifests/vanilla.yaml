# Source: georag/templates/jobs.yaml
# One-shot Job that runs the bundled Phase 0 SQL migrations on first install.
# Subsequent helm upgrades re-run it (idempotent — every migration uses
# CREATE * IF NOT EXISTS / DO NOTHING ON CONFLICT).
apiVersion: batch/v1
kind: Job
metadata:
  name: georag-pg-init
  namespace: georag
  labels:
    helm.sh/chart: georag-0.1.0
    app.kubernetes.io/name: georag
    app.kubernetes.io/instance: georag
    app.kubernetes.io/version: "v1.0.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: georag
        app.kubernetes.io/instance: georag
        app.kubernetes.io/component: pg-init
    spec:
      restartPolicy: OnFailure
      
      containers:
        - name: pg-init
          image: ghcr.io/anthropics/georag/fastapi:v1.0.0
          imagePullPolicy: IfNotPresent
          command: ["bash", "-lc"]
          args:
            - |
              set -e
              echo "Waiting for postgres to be ready..."
              until pg_isready -h $PGHOST -U $PGUSER; do sleep 2; done
              echo "Applying migrations..."
              for f in /app/database/raw/phase0/*.sql; do
                echo "→ $f"
                PGPASSWORD=$PGPASSWORD psql -h $PGHOST -U $PGUSER -d $PGDATABASE -f "$f" -v ON_ERROR_STOP=1
              done
              echo "pg-init complete."
          env:
            - name: PGHOST
              value: georag-postgresql
            - name: PGUSER
              value: georag
            - name: PGDATABASE
              value: georag
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: georag-secrets
                  key: POSTGRES_PASSWORD
