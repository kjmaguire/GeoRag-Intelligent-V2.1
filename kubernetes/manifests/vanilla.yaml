apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: georag-ingress
  namespace: georag
  labels:
    helm.sh/chart: georag-0.1.0
    app.kubernetes.io/name: georag
    app.kubernetes.io/instance: georag
