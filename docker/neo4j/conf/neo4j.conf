# =============================================================================
# GeoRAG — Neo4j Community Edition 2026 Configuration
# =============================================================================
# Community Edition only — do not reference Enterprise-only settings.
# See: .claude/agents/graph-engineer.md and Section 06b of the architecture doc.

# --- Memory ------------------------------------------------------------------
# Page cache: holds graph data pages in memory. 4G is sized for the eventual
# multi-province public-geoscience corpus (~5M nodes + 20M rels). Today's
# graph is ~56k nodes / ~100k rels (≈30 MB on disk) so the cache is vastly
# over-provisioned — that's deliberate headroom.
#
# Right-sizing rule of thumb: page-cache should hold the entire graph plus
# 30 % working-set headroom. If you ever ship to a 16 GB host where Neo4j
# competes with other services, drop both this AND heap to 1G/1G; current
# graph fits comfortably in 1G.
server.memory.pagecache.size=4G

# JVM heap: 2G initial, 4G max. Keep initial < max to avoid premature GC
# pressure during query plans that allocate large intermediate result sets.
# In a 16 GB-host scale-down: 1G/1G (matches page cache) is safe.
server.memory.heap.initial_size=2G
server.memory.heap.max_size=4G

# --- Network -----------------------------------------------------------------
# Listen on all interfaces inside the container
server.default_listen_address=0.0.0.0

# Bolt connector (application driver connections)
server.bolt.listen_address=:7687
server.bolt.advertised_address=:7687

# HTTP connector (browser and REST API)
server.http.listen_address=:7474
server.http.advertised_address=:7474

# --- Transaction -------------------------------------------------------------
# Neo4j review #5 — `db.transaction.timeout` is set in docker-compose.yml
# (NEO4J_dbms_transaction_timeout=60s) NOT here, because the value
# differs between dev (where Dagster ingestion needs headroom) and
# any future read-only replica (where 3 s would be appropriate).
# The hybrid model:
#   * FastAPI chat tools: client-side `asyncio.wait_for(TIMEOUT_NEO4J_S=3.0)`
#     (see app/agent/tools.py and app/agent/orchestrator.py) — fires first
#     under normal operation.
#   * Server-side `db.transaction.timeout=60s` (compose) — backstop for
#     the case where the asyncio cancel can't propagate (Neo4j is mid-call
#     into a long graph algorithm and only checks for cancellation at
#     operation boundaries).
# Switch to per-query `session.execute_read(work, timeout=...)` later if
# you want true per-query enforcement instead of the hybrid.

# Neo4j review #3 — `db.lock.acquisition.timeout=2s`. Default was 0s
# which DOES NOT mean "fail fast" — it means "wait forever". A query
# blocked on a write lock would sit waiting until something else
# released it, producing silent head-of-line blocking under any
# concurrent write load. 2 s is below the FastAPI per-tool 3 s ceiling
# so the lock-acquisition error always fires first with a clean
# `LockAcquisitionTimeoutException` the tool wrapper can catch.
db.lock.acquisition.timeout=2s

# --- Logging -----------------------------------------------------------------
server.directories.logs=/logs
dbms.logs.query.enabled=INFO
dbms.logs.query.threshold=1s

# --- Metrics (Neo4j review #7) ----------------------------------------------
# Neo4j 2026 Community Edition does NOT ship the Prometheus metrics
# exporter — those settings (server.metrics.*, server.metrics.prometheus.*)
# are gated to Enterprise in the 2026.x line. Strict-config validation
# rejects them outright at startup.
#
# Workaround for Community Edition: poll via cypher-shell + a Prometheus
# textfile collector. A future `scripts/neo4j_metrics_exporter.sh`
# can run every 30 s, query `CALL dbms.queryJmx(...)` for the relevant
# JMX beans, and write to /var/lib/node_exporter/textfile_collector/.
#
# Counters worth exporting that way:
#   - heap usage (java.lang:type=Memory.HeapMemoryUsage.used)
#   - page-cache hit ratio (no JMX bean — query CALL dbms.listConfig +
#     count of page-cache misses via debug log shipping; harder, defer)
#   - bolt connections (org.neo4j:instance=*,name=bolt.connections_running)
#   - transaction throughput (org.neo4j:instance=*,name=transactions.committed)
#
# Until the textfile-collector ships, observability comes from:
#   1. The Loki-shipped query log (`db.logs.query.threshold=1s`).
#   2. The existing FastAPI-side `TOOL_DURATION{tool="traverse_knowledge_graph"}`
#      and friends — they cover the user-perceived path even without
#      server-side counters.

# --- Security ----------------------------------------------------------------
# Auth is disabled for local dev. Set NEO4J_AUTH=neo4j/<password> in .env for staging/prod.
# Community Edition has no database-level RBAC — Laravel handles all permissions.

