apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Module 10 Chunk 10.6 — Loki for log queries from Grafana dashboards.
  # The authz dashboard's panels switch to LogQL count_over_time once
  # this datasource resolves.
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
