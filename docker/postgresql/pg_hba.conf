# =============================================================================
# GeoRAG PostgreSQL Host-Based Authentication
# =============================================================================
#
# Managed by DevOps — bind-mounted into the PostgreSQL container at
# /etc/postgresql/pg_hba.conf and activated via:
#   -c hba_file=/etc/postgresql/pg_hba.conf
#
# This file overrides whatever pg_hba.conf lives in PGDATA.
# Works on fresh-init AND existing-volume clusters without a volume wipe.
#
# Network CIDR: 172.19.0.0/16 (georag bridge — verified 2026-04-19)
#   docker network inspect georag | jq '.[].IPAM.Config'
#
# Auth method: scram-sha-256 for all remote connections.
# =============================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket — always trust (required for pg_isready and init scripts)
local   all             all                                     trust

# Loopback — scram-sha-256
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker bridge (all services on the georag network)
host    all             all             0.0.0.0/0               scram-sha-256

# Replication rules for backup-agent (pg_basebackup requires a replication
# slot connection; PgBouncer does not proxy replication connections).
# Module 1 Phase B, 2026-04-19 — previously added manually to PGDATA volume.
# Module 1 Phase C prep — baked into bind-mount so it survives volume wipes.
host    replication     all             172.19.0.0/16           scram-sha-256
local   replication     all                                     trust
