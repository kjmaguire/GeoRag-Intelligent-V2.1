# =============================================================================
# WAL Archiving — Reference Documentation (NOT actively loaded)
# =============================================================================
#
# Implementation status (2026-05-07): WAL archiving is activated via
# `ALTER SYSTEM` from `init/Z_activate_wal_archiving.sql`, not from this
# file. The settings live in `postgresql.auto.conf` inside the data volume,
# so they survive container recreation as long as the volume persists.
#
# This file remains as a reference for operators reading config docs.
# Editing it has NO effect on running PostgreSQL — change the activation
# SQL or use `ALTER SYSTEM SET ...` to modify behaviour.
#
# Apply path:
#   1. docker/compose.wal-archiving.yml — overlay that mounts the
#      pg_wal_archive volume + bind-mounts the activation SQL into
#      /docker-entrypoint-initdb.d/.
#   2. docker/postgresql/init/Z_activate_wal_archiving.sql — runs ALTER
#      SYSTEM on first init. On existing volumes, run manually per
#      ops/runbooks/backup-restore.md §"Activate WAL archiving on existing
#      cluster".
#   3. docker/postgresql/wal-upload.sh — runs in georag-backup-agent every
#      5 minutes via Ofelia, syncs /pg_wal_archive → SeaweedFS S3, applies
#      8-day retention.
#
# RPO target:
#   archive_timeout=60s + Ofelia 5-minute interval ≈ 6-minute worst case.
#   Daily pg_basebackup gives the recovery floor.
# =============================================================================

# These are the values applied by Z_activate_wal_archiving.sql. Listed here
# for grep-ability and documentation.
#
#   wal_level         = replica   (default in PG 18; explicit here for clarity)
#   archive_mode      = on
#   archive_command   = 'test ! -f /pg_wal_archive/%f && cp %p /pg_wal_archive/%f'
#   archive_timeout   = 60        (force WAL switch every 60s if idle)
#
# Recovery (during PITR restore — see backup-restore.md):
#   restore_command   = 'aws s3 cp s3://georag-backups/pg-wal/%f %p \
#                          --endpoint-url $S3_ENDPOINT_URL'
#   recovery_target_time = '2026-05-07 14:30:00 UTC'   # example
#
# Operational notes:
#   * archive_command failures are NOT fatal to PG — it retains the WAL
#     segment and retries. Repeated failure causes pg_wal to grow until
#     the data volume fills (then PG stalls). Prometheus alert
#     PostgresArchiveCommandFailing catches this within 2 minutes.
#   * The `test ! -f` guard makes archive_command idempotent on retry.
#     If pg_wal_archive already has the segment (e.g., from a partial
#     previous attempt), the command exits 0 without overwriting.
#   * archive_mode is POSTMASTER-LEVEL — changing it requires `pg_ctl
#     restart` (or `docker compose restart postgresql`). archive_command
#     and archive_timeout are SIGHUP-reloadable via `pg_reload_conf()`.
